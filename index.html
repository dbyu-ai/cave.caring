<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사원 인사 관리 ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
    <!-- 로그인 페이지 -->
    <div id="login-page" class="login-container active">
        <div class="login-box">
            <div class="login-header">
                <h1>👔 케어링 인사 관리</h1>
                <p>로그인</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="login-form-group">
                    <label>회사 계정 (아이디)</label>
                    <input type="text" id="login-id" placeholder="예: employee@company.com" required>
                </div>
                <div class="login-form-group">
                    <label>비밀번호</label>
                    <input type="password" id="login-password" placeholder="비밀번호 입력" required>
                </div>
                <button type="submit" class="login-btn">로그인</button>
                <p class="login-helper">
                    📌 계정: <strong>db.yu@caring.co.kr</strong> / <strong>gkfnql123!</strong>
                </p>
            </form>
        </div>
    </div>

    <!-- ERP 메인 페이지 -->
    <div id="main-page" class="container">
        <!-- 헤더 -->
        <header class="header">
            <div class="header-content">
                <h1>👔 케어링 인사 관리</h1>
                <p>회사 인사 정보 통합 관리</p>
            </div>
            <div class="header-user">
                <span id="user-name">admin</span>
                <button class="logout-btn" id="logout-btn">🚪 로그아웃</button>
            </div>
        </header>

        <!-- 메인 콘텐츠 -->
        <main class="main">
            <!-- 좌측 메뉴 -->
            <aside class="sidebar">
                <nav class="menu">
                    <button class="menu-btn active" data-tab="dashboard">
                        📊 대시보드
                    </button>
                    <button class="menu-btn" data-tab="employees">
                        👥 사원 조회
                    </button>
                    <button class="menu-btn" data-tab="add-employee">
                        ➕ 사원 추가
                    </button>
                    <button class="menu-btn" data-tab="salary">
                        💰 급여 관리
                    </button>
                    <button class="menu-btn" data-tab="vacation">
                        🏖️ 휴가 관리
                    </button>
                </nav>
            </aside>

            <!-- 우측 콘텐츠 -->
            <section class="content">
                <!-- 대시보드 탭 -->
                <div id="dashboard" class="tab-content active">
                    <h2>대시보드</h2>
                    <div class="dashboard-grid">
                        <div class="card">
                            <h3>전체 사원</h3>
                            <p class="number" id="total-employees">5</p>
                        </div>
                        <div class="card">
                            <h3>부서 수</h3>
                            <p class="number">3</p>
                        </div>
                        <div class="card">
                            <h3>진행 중인 휴가</h3>
                            <p class="number">2</p>
                        </div>
                        <div class="card">
                            <h3>이달 신입</h3>
                            <p class="number">0</p>
                        </div>
                    </div>
                </div>

                <!-- 사원 조회 탭 -->
                <div id="employees" class="tab-content">
                    <h2>사원 조회</h2>
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="사원명이나 부서로 검색...">
                        <button class="btn btn-search" id="search-btn">🔍 검색</button>
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>사원번호</th>
                                <th>이름</th>
                                <th>부서</th>
                                <th>직급</th>
                                <th>이메일</th>
                                <th>입사일</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody id="employees-table">
                            <!-- 동적으로 채워짐 -->
                        </tbody>
                    </table>
                </div>

                <!-- 사원 추가 탭 -->
                <div id="add-employee" class="tab-content">
                    <h2>사원 정보 추가</h2>
                    <form id="employee-form" class="form">
                        <div class="form-group">
                            <label>이름 *</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>부서 *</label>
                            <select name="department" required>
                                <option value="">부서 선택</option>
                                <option value="개발팀">개발팀</option>
                                <option value="영업팀">영업팀</option>
                                <option value="인사팀">인사팀</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>직급 *</label>
                            <select name="position" required>
                                <option value="">직급 선택</option>
                                <option value="사원">사원</option>
                                <option value="대리">대리</option>
                                <option value="과장">과장</option>
                                <option value="부장">부장</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>이메일 *</label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>입사일 *</label>
                            <input type="date" name="hire_date" required>
                        </div>
                        <div class="form-group">
                            <label>휴대폰</label>
                            <input type="tel" name="phone">
                        </div>
                        <button type="submit" class="btn btn-primary">➕ 사원 추가</button>
                    </form>
                </div>

                <!-- 급여 관리 탭 -->
                <div id="salary" class="tab-content">
                    <h2>급여 관리</h2>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>사원명</th>
                                <th>부서</th>
                                <th>기본급</th>
                                <th>상여금</th>
                                <th>수당</th>
                                <th>총급여</th>
                            </tr>
                        </thead>
                        <tbody id="salary-table">
                            <!-- 동적으로 채워짐 -->
                        </tbody>
                    </table>
                </div>

                <!-- 휴가 관리 탭 -->
                <div id="vacation" class="tab-content">
                    <h2>휴가 관리</h2>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>사원명</th>
                                <th>휴가 종류</th>
                                <th>시작일</th>
                                <th>종료일</th>
                                <th>일수</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody id="vacation-table">
                            <!-- 동적으로 채워짐 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
